<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin RobloxStore</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07111f;color:#e8f4ff;font-family:sans-serif;padding:16px;}
h1{color:#2d9cff;font-size:1.3rem;margin-bottom:20px;}
h2{font-size:1rem;margin-bottom:12px;color:#5bb8ff;}
.card{background:#112540;border:1px solid #1a3a5c;border-radius:12px;padding:16px;margin-bottom:16px;}
input,select,textarea{width:100%;background:#07111f;border:1px solid #1a3a5c;color:#e8f4ff;padding:10px;border-radius:8px;font-size:0.9rem;margin-bottom:10px;outline:none;}
button{width:100%;padding:12px;background:#2d9cff;color:#fff;border:none;border-radius:8px;font-size:0.95rem;font-weight:700;cursor:pointer;margin-bottom:8px;}
button.red{background:#f43f5e;}
button.gray{background:#1a3a5c;}
#msg{padding:10px;border-radius:8px;margin-bottom:12px;display:none;font-size:0.85rem;}
#msg.ok{background:rgba(34,211,165,0.2);color:#22d3a5;display:block;}
#msg.err{background:rgba(244,63,94,0.2);color:#f43f5e;display:block;}
.prod-item{background:#07111f;border:1px solid #1a3a5c;border-radius:8px;padding:12px;margin-bottom:8px;}
.prod-name{font-weight:700;margin-bottom:4px;}
.prod-info{font-size:0.8rem;color:#7aaac7;margin-bottom:8px;}
.row{display:flex;gap:8px;}
.row button{margin:0;}
</style>
</head>
<body>

<h1>🎮 Admin RobloxStore</h1>
<div id="msg"></div>

<!-- TAMBAH PRODUK -->
<div class="card">
  <h2>➕ Tambah Produk</h2>
  <input type="text" id="p-name" placeholder="Nama produk *" />
  <select id="p-cat">
    <option value="starter">Starter</option>
    <option value="mid">Mid-Range</option>
    <option value="premium">Premium</option>
    <option value="rare">Rare Items</option>
  </select>
  <input type="number" id="p-price" placeholder="Harga (Rp) *" />
  <input type="number" id="p-stock" placeholder="Stok *" />
  <input type="text" id="p-desc" placeholder="Deskripsi singkat" />
  <input type="text" id="p-img" placeholder="URL gambar (opsional)" />
  <button onclick="tambahProduk()">Simpan Produk</button>
</div>

<!-- DAFTAR PRODUK -->
<div class="card">
  <h2>📦 Daftar Produk</h2>
  <button class="gray" onclick="loadProduk()">🔄 Refresh</button>
  <div id="prod-list">Memuat...</div>
</div>

<!-- TAMBAH PROMO -->
<div class="card">
  <h2>🎁 Tambah Promo</h2>
  <input type="text" id="pr-code" placeholder="Kode promo (contoh: HEMAT10)" style="text-transform:uppercase"/>
  <select id="pr-type">
    <option value="percent">Persen (%)</option>
    <option value="fixed">Nominal (Rp)</option>
  </select>
  <input type="number" id="pr-val" placeholder="Nilai diskon" />
  <input type="text" id="pr-desc" placeholder="Deskripsi promo" />
  <button onclick="tambahPromo()">Simpan Promo</button>
</div>

<!-- DAFTAR PROMO -->
<div class="card">
  <h2>🏷️ Daftar Promo</h2>
  <button class="gray" onclick="loadPromo()">🔄 Refresh</button>
  <div id="promo-list">Memuat...</div>
</div>

<script>
function msg(text, type) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = type;
  setTimeout(function(){ el.style.display='none'; el.className=''; }, 3000);
}

function fmt(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }

async function tambahProduk() {
  var name = document.getElementById('p-name').value.trim();
  var price = document.getElementById('p-price').value;
  var stock = document.getElementById('p-stock').value;
  if (!name || !price || !stock) { msg('Nama, harga, dan stok wajib diisi!', 'err'); return; }
  try {
    var res = await fetch('/api/products', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name: name,
        category: document.getElementById('p-cat').value,
        price: Number(price),
        stock: Number(stock),
        short_desc: document.getElementById('p-desc').value,
        description: document.getElementById('p-desc').value,
        image_url: document.getElementById('p-img').value
      })
    });
    var data = await res.json();
    if (res.ok) {
      msg('Produk berhasil ditambahkan!', 'ok');
      document.getElementById('p-name').value = '';
      document.getElementById('p-price').value = '';
      document.getElementById('p-stock').value = '';
      document.getElementById('p-desc').value = '';
      document.getElementById('p-img').value = '';
      loadProduk();
    } else {
      msg('Error: ' + (data.message || 'Gagal'), 'err');
    }
  } catch(e) {
    msg('Error: ' + e.message, 'err');
  }
}

async function loadProduk() {
  document.getElementById('prod-list').innerHTML = 'Memuat...';
  try {
    var res = await fetch('/api/products');
    var data = await res.json();
    if (!data.length) { document.getElementById('prod-list').innerHTML = '<p style="color:#7aaac7;font-size:0.85rem">Belum ada produk</p>'; return; }
    document.getElementById('prod-list').innerHTML = data.map(function(p) {
      return '<div class="prod-item">' +
        '<div class="prod-name">' + p.name + '</div>' +
        '<div class="prod-info">' + fmt(p.price) + ' · Stok: ' + p.stock + ' · ' + (p.category||'-') + '</div>' +
        '<div class="row">' +
        '<button class="gray" onclick="editStok(' + p.id + ',' + p.stock + ')">✏️ Edit Stok</button>' +
        '<button class="red" onclick="hapusProduk(' + p.id + ')">🗑️ Hapus</button>' +
        '</div></div>';
    }).join('');
  } catch(e) {
    document.getElementById('prod-list').innerHTML = '<p style="color:#f43f5e">Gagal memuat</p>';
  }
}

async function hapusProduk(id) {
  if (!confirm('Hapus produk ini?')) return;
  await fetch('/api/products/' + id, {method: 'DELETE'});
  msg('Produk dihapus!', 'ok');
  loadProduk();
}

async function editStok(id, stok) {
  var baru = prompt('Stok baru (sekarang: ' + stok + '):', stok);
  if (baru === null) return;
  await fetch('/api/products/' + id, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({stock: Number(baru)})
  });
  msg('Stok diupdate!', 'ok');
  loadProduk();
}

async function tambahPromo() {
  var code = document.getElementById('pr-code').value.trim().toUpperCase();
  var val = document.getElementById('pr-val').value;
  if (!code || !val) { msg('Kode dan nilai wajib diisi!', 'err'); return; }
  try {
    var res = await fetch('/api/promos', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        code: code,
        type: document.getElementById('pr-type').value,
        value: Number(val),
        description: document.getElementById('pr-desc').value,
        is_active: true
      })
    });
    var data = await res.json();
    if (res.ok) {
      msg('Promo berhasil ditambahkan!', 'ok');
      document.getElementById('pr-code').value = '';
      document.getElementById('pr-val').value = '';
      document.getElementById('pr-desc').value = '';
      loadPromo();
    } else {
      msg('Error: ' + (data.message || 'Gagal'), 'err');
    }
  } catch(e) {
    msg('Error: ' + e.message, 'err');
  }
}

async function loadPromo() {
  document.getElementById('promo-list').innerHTML = 'Memuat...';
  try {
    var res = await fetch('/api/promos');
    var data = await res.json();
    if (!data.length) { document.getElementById('promo-list').innerHTML = '<p style="color:#7aaac7;font-size:0.85rem">Belum ada promo</p>'; return; }
    document.getElementById('promo-list').innerHTML = data.map(function(p) {
      return '<div class="prod-item">' +
        '<div class="prod-name">' + p.code + '</div>' +
        '<div class="prod-info">' + (p.type==='percent' ? p.value+'%' : fmt(p.value)) + ' · ' + (p.is_active ? '✅ Aktif' : '❌ Nonaktif') + '</div>' +
        '<button class="red" onclick="hapusPromo(' + p.id + ')">🗑️ Hapus</button>' +
        '</div>';
    }).join('');
  } catch(e) {
    document.getElementById('promo-list').innerHTML = '<p style="color:#f43f5e">Gagal memuat</p>';
  }
}

async function hapusPromo(id) {
  if (!confirm('Hapus promo ini?')) return;
  await fetch('/api/promos/' + id, {method: 'DELETE'});
  msg('Promo dihapus!', 'ok');
  loadPromo();
}

loadProduk();
loadPromo();
</script>
</body>
</html>
