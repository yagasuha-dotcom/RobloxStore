<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RobloxStore — Akun Premium Roblox</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #07111f;
      --surface:  #0d1f35;
      --card:     #112540;
      --border:   #1a3a5c;
      --accent:   #2d9cff;
      --accent2:  #5bb8ff;
      --glow:     rgba(45,156,255,0.18);
      --text:     #e8f4ff;
      --muted:    #7aaac7;
      --success:  #22d3a5;
      --warn:     #f59e0b;
      --danger:   #f43f5e;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top:0; z-index:100;
      background: rgba(7,17,31,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 5%;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem; font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 8px;
    }
    .logo span { color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .cart-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px; border-radius: 8px;
      cursor: pointer; font-size: 0.9rem;
      display: flex; align-items: center; gap: 6px;
      transition: border-color .2s;
    }
    .cart-btn:hover { border-color: var(--accent); }
    .cart-count {
      background: var(--accent); color: #fff;
      font-size: 0.7rem; font-weight: 700;
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── HERO ── */
    .hero {
      padding: 80px 5% 60px;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(45,156,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(45,156,255,0.1);
      border: 1px solid rgba(45,156,255,0.3);
      color: var(--accent2); font-size: 0.8rem; font-weight: 600;
      padding: 5px 14px; border-radius: 20px;
      margin-bottom: 24px; letter-spacing: 0.5px;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 800; line-height: 1.1;
      margin-bottom: 16px;
    }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p {
      color: var(--muted); font-size: 1rem; max-width: 480px;
      margin: 0 auto 32px;
    }
    .stats {
      display: flex; justify-content: center; gap: 40px;
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem; font-weight: 800;
      color: var(--accent);
    }
    .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    /* ── PROMO BANNER ── */
    #promo-section { padding: 0 5% 12px; }
    .promo-card {
      background: linear-gradient(135deg, rgba(45,156,255,0.15), rgba(91,184,255,0.08));
      border: 1px solid rgba(45,156,255,0.35);
      border-radius: 12px; padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
    }
    .promo-badge {
      background: var(--accent); color: #fff;
      font-size: 0.72rem; font-weight: 700;
      padding: 4px 10px; border-radius: 6px;
      white-space: nowrap; letter-spacing: 0.5px;
    }
    .promo-text { flex:1; font-size: 0.9rem; color: var(--text); }
    .promo-code {
      background: var(--card);
      border: 1px dashed var(--accent);
      color: var(--accent); font-weight: 700;
      font-size: 0.85rem; padding: 5px 12px;
      border-radius: 6px; cursor: pointer;
      user-select: all; letter-spacing: 1px;
    }

    /* ── FILTER ── */
    .section-header {
      padding: 40px 5% 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem; font-weight: 800;
    }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); padding: 6px 16px;
      border-radius: 20px; font-size: 0.82rem;
      cursor: pointer; transition: all .2s;
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent); color: var(--accent);
      background: rgba(45,156,255,0.08);
    }

    /* ── SEARCH ── */
    .search-wrap { padding: 0 5% 24px; }
    .search-box {
      display: flex; align-items: center;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      transition: border-color .2s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-box input {
      flex:1; background: transparent; border: none; outline: none;
      color: var(--text); padding: 12px 16px; font-size: 0.9rem;
    }
    .search-box input::placeholder { color: var(--muted); }
    .search-icon { padding: 12px 16px; color: var(--muted); }

    /* ── GRID ── */
    .products-grid {
      padding: 0 5% 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    /* ── CARD ── */
    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      cursor: pointer; position: relative;
    }
    .product-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 32px var(--glow);
    }
    .card-img {
      width: 100%; aspect-ratio: 16/9;
      object-fit: cover; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    .card-img img { width:100%; height:100%; object-fit:cover; }
    .card-body { padding: 16px; }
    .card-badges { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .badge {
      font-size: 0.68rem; font-weight: 700;
      padding: 3px 8px; border-radius: 4px;
      letter-spacing: 0.4px;
    }
    .badge-stock { background: rgba(34,211,165,0.15); color: var(--success); }
    .badge-empty { background: rgba(244,63,94,0.15); color: var(--danger); }
    .badge-hot   { background: rgba(245,158,11,0.15); color: var(--warn); }
    .badge-new   { background: rgba(45,156,255,0.15); color: var(--accent); }
    .card-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 1rem;
      margin-bottom: 4px; line-height: 1.3;
    }
    .card-desc { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .price {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem; font-weight: 800;
      color: var(--accent);
    }
    .price-orig {
      font-size: 0.75rem; color: var(--muted);
      text-decoration: line-through; margin-top: 2px;
    }
    .buy-btn {
      background: var(--accent);
      color: #fff; border: none;
      padding: 8px 16px; border-radius: 8px;
      font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: background .2s, transform .1s;
    }
    .buy-btn:hover { background: var(--accent2); }
    .buy-btn:active { transform: scale(0.97); }
    .buy-btn:disabled { background: var(--border); cursor: not-allowed; color: var(--muted); }

    .card-ribbon {
      position: absolute; top: 10px; right: 10px;
      background: var(--warn); color: #fff;
      font-size: 0.68rem; font-weight: 700;
      padding: 3px 8px; border-radius: 4px;
      letter-spacing: 0.5px;
    }

    /* ── SKELETON ── */
    .skeleton {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    .skeleton-img { width:100%; aspect-ratio:16/9; background: var(--surface); }
    .skeleton-body { padding:16px; }
    .skel {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px; margin-bottom: 8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset:0; z-index:200;
      background: rgba(7,17,31,0.8);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      opacity:0; pointer-events:none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      transform: translateY(20px); transition: transform .25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title {
      font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem;
    }
    .modal-close {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); width:32px; height:32px;
      border-radius:8px; cursor:pointer; font-size:1rem;
      display:flex; align-items:center; justify-content:center;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 20px 24px; }
    .modal-img {
      width:100%; aspect-ratio:16/9; border-radius:10px;
      object-fit:cover; background: var(--surface);
      display:flex; align-items:center; justify-content:center;
      font-size:3rem; margin-bottom:16px; overflow:hidden;
    }
    .modal-img img { width:100%; height:100%; object-fit:cover; }
    .modal-price { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; color:var(--accent); margin-bottom:4px; }
    .modal-desc { color:var(--muted); font-size:0.88rem; line-height:1.6; margin-bottom:20px; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
    .detail-item {
      background:var(--surface); border:1px solid var(--border);
      border-radius:8px; padding:10px 12px;
    }
    .detail-label { font-size:0.72rem; color:var(--muted); margin-bottom:2px; }
    .detail-val { font-size:0.9rem; font-weight:600; }
    .promo-input-wrap { margin-bottom:16px; }
    .promo-input-wrap label { font-size:0.82rem; color:var(--muted); display:block; margin-bottom:6px; }
    .promo-row { display:flex; gap:8px; }
    .promo-row input {
      flex:1; background:var(--surface); border:1px solid var(--border);
      color:var(--text); padding:10px 14px; border-radius:8px;
      font-size:0.88rem; outline:none; transition:border-color .2s;
      text-transform:uppercase; letter-spacing:1px;
    }
    .promo-row input:focus { border-color:var(--accent); }
    .promo-apply {
      background:var(--surface); border:1px solid var(--border);
      color:var(--accent); padding:10px 14px; border-radius:8px;
      cursor:pointer; font-weight:600; font-size:0.82rem;
      transition:border-color .2s;
    }
    .promo-apply:hover { border-color:var(--accent); }
    .promo-msg { font-size:0.8rem; margin-top:6px; min-height:18px; }
    .promo-msg.ok  { color:var(--success); }
    .promo-msg.err { color:var(--danger); }
    .buy-modal-btn {
      width:100%; padding:14px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border:none; color:#fff; border-radius:10px;
      font-family:'Syne',sans-serif; font-weight:700; font-size:1rem;
      cursor:pointer; transition:opacity .2s;
    }
    .buy-modal-btn:hover { opacity:0.88; }
    .buy-modal-btn:disabled { opacity:0.4; cursor:not-allowed; }

    /* ── TOAST ── */
    #toast {
      position:fixed; bottom:24px; right:24px; z-index:999;
      background:var(--card); border:1px solid var(--border);
      color:var(--text); padding:12px 18px; border-radius:10px;
      font-size:0.88rem; box-shadow:0 4px 24px rgba(0,0,0,0.4);
      transform:translateY(20px); opacity:0; transition:all .3s;
      max-width:280px;
    }
    #toast.show { transform:translateY(0); opacity:1; }
    #toast.success { border-color:var(--success); color:var(--success); }
    #toast.error   { border-color:var(--danger);  color:var(--danger); }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column:1/-1; text-align:center; padding:60px 20px;
      color:var(--muted);
    }
    .empty-state .icon { font-size:3rem; margin-bottom:12px; }
    .empty-state p { font-size:0.9rem; }

    /* ── FOOTER ── */
    footer {
      border-top:1px solid var(--border);
      padding:24px 5%; text-align:center;
      color:var(--muted); font-size:0.8rem;
    }
    footer a { color:var(--accent); text-decoration:none; }

    @media(max-width:600px){
      .stats { gap:24px; }
      .detail-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">🎮 <span>Roblox</span>Store</div>
  <div class="nav-right">
    <button class="cart-btn" onclick="openCart()">
      🛒 Keranjang <span class="cart-count" id="cart-count">0</span>
    </button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-tag">⚡ Terpercaya & Cepat</div>
  <h1>Akun Roblox <em>Premium</em><br>Harga Terjangkau</h1>
  <p>Koleksi akun Roblox pilihan — lengkap dengan Robux, item rare, dan garansi aman.</p>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-sold">500+</div><div class="stat-label">Terjual</div></div>
    <div class="stat"><div class="stat-num" id="stat-products">—</div><div class="stat-label">Produk Tersedia</div></div>
    <div class="stat"><div class="stat-num">⭐ 4.9</div><div class="stat-label">Rating</div></div>
  </div>
</section>

<!-- PROMO -->
<section id="promo-section"></section>

<!-- FILTER & SEARCH -->
<div class="section-header">
  <div class="section-title">Semua Produk</div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">Semua</button>
    <button class="filter-btn" data-cat="starter">Starter</button>
    <button class="filter-btn" data-cat="mid">Mid-Range</button>
    <button class="filter-btn" data-cat="premium">Premium</button>
    <button class="filter-btn" data-cat="rare">Rare Items</button>
  </div>
</div>
<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Cari produk..." id="search-input" oninput="filterProducts()" />
  </div>
</div>

<!-- GRID -->
<div class="products-grid" id="products-grid">
  <!-- skeleton -->
  ${Array(6).fill(`
    <div class="skeleton">
      <div class="skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skel" style="height:12px;width:60%"></div>
        <div class="skel" style="height:18px;width:80%"></div>
        <div class="skel" style="height:12px;width:100%"></div>
      </div>
    </div>
  `).join('')}
</div>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Detail Produk</span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-img" id="modal-img">🎮</div>
      <div class="modal-price" id="modal-price"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="detail-grid" id="modal-details"></div>
      <div class="promo-input-wrap">
        <label>Kode Promo (opsional)</label>
        <div class="promo-row">
          <input type="text" id="promo-input" placeholder="Contoh: HEMAT10" maxlength="20" />
          <button class="promo-apply" onclick="applyPromo()">Pakai</button>
        </div>
        <div class="promo-msg" id="promo-msg"></div>
      </div>
      <button class="buy-modal-btn" id="buy-modal-btn" onclick="confirmBuy()">Beli Sekarang</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- FOOTER -->
<footer>
  <p>© 2025 RobloxStore · <a href="/admin">Admin Panel</a></p>
</footer>

<script>
  const API = '';  // kosong = same origin
  let allProducts = [];
  let activePromo = null;
  let selectedProduct = null;
  let activeCategory = 'all';

  // ── FORMAT HARGA ──
  const fmt = n => 'Rp ' + Number(n).toLocaleString('id-ID');

  // ── LOAD PRODUCTS ──
  async function loadProducts() {
    try {
      const res = await fetch(`${API}/api/products`);
      const data = await res.json();
      allProducts = data;
      document.getElementById('stat-products').textContent = data.filter(p => p.stock > 0).length;
      renderProducts(data);
    } catch(e) {
      console.error(e);
      document.getElementById('products-grid').innerHTML = `
        <div class="empty-state">
          <div class="icon">⚠️</div>
          <p>Gagal memuat produk. Coba refresh halaman.</p>
        </div>`;
    }
  }

  // ── LOAD PROMO ──
  async function loadPromos() {
    try {
      const res = await fetch(`${API}/api/promos`);
      const data = await res.json();
      const active = data.find(p => p.is_active);
      if (!active) return;
      document.getElementById('promo-section').innerHTML = `
        <div class="promo-card">
          <span class="promo-badge">🔥 PROMO</span>
          <span class="promo-text">${active.description || 'Diskon spesial untuk kamu!'}</span>
          <span class="promo-code" title="Klik untuk copy" onclick="copyCode('${active.code}')">${active.code}</span>
        </div>`;
    } catch(e) {}
  }

  function copyCode(code) {
    navigator.clipboard.writeText(code).then(() => showToast('Kode ' + code + ' disalin!', 'success'));
    document.getElementById('promo-input').value = code;
  }

  // ── RENDER PRODUCTS ──
  function renderProducts(products) {
    const grid = document.getElementById('products-grid');
    if (!products.length) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">😔</div><p>Tidak ada produk ditemukan.</p></div>`;
      return;
    }
    grid.innerHTML = products.map(p => {
      const inStock = p.stock > 0;
      const isHot = p.stock < 3 && inStock;
      const imgHTML = p.image_url
        ? `<img src="${p.image_url}" alt="${p.name}" loading="lazy" />`
        : '🎮';
      return `
        <div class="product-card" onclick="openModal(${p.id})">
          ${p.discount_percent ? `<div class="card-ribbon">-${p.discount_percent}%</div>` : ''}
          <div class="card-img">${imgHTML}</div>
          <div class="card-body">
            <div class="card-badges">
              <span class="badge ${inStock ? 'badge-stock' : 'badge-empty'}">${inStock ? `Stok ${p.stock}` : 'Habis'}</span>
              ${isHot ? '<span class="badge badge-hot">🔥 Hampir Habis</span>' : ''}
              ${p.is_new ? '<span class="badge badge-new">✨ Baru</span>' : '
